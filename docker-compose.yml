services:
  pec-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pec-mcp-app
    restart: unless-stopped
    ports:
      # Maps Host Port (defined in .env) to Internal Container Port (Fixed)
      - "${HOST_UI_PORT:-8001}:8001"
      - "${HOST_MCP_PORT:-5174}:5174"
    env_file:
      - .env
    environment:
      # Force internal listening ports to match Dockerfile/Healthcheck expectations
      # irrespective of what might be in .env for bare-metal usage.
      - UI_HOST=0.0.0.0
      - UI_PORT=8001
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=5174
      # Database connection
      - PEC_DB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
